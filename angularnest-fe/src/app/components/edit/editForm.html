<form>
  <label>
    Name:
    <input type="text" [(ngModel)]="name" name="name">
  </label>
  <label>
    Description:
    <input type="text" [(ngModel)]="description" name="description">
  </label>
  <label>
    Done:
    <input type="checkbox" [(ngModel)]="done" name="done">
  </label>
  <button (click)="update()" class="update">Edit</button>
  <button (click)="deleteTodo()" class="delete">Delete</button>
</form>
